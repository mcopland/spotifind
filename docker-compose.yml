name: spotifind
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: spotifind
      POSTGRES_USER: spotifind
      POSTGRES_PASSWORD: spotifind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotifind"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
