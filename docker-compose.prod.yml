name: spotifind-prod
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: spotifind
      POSTGRES_USER: spotifind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotifind"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://spotifind:${POSTGRES_PASSWORD}@db:5432/spotifind?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [tools]
    env_file: .env
    environment:
      DATABASE_URL: postgres://spotifind:${POSTGRES_PASSWORD}@db:5432/spotifind?sslmode=disable
    command: ["/app/migrate"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata-prod:
