name: spotifind-test
services:
  db-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: spotifind_test
      POSTGRES_USER: spotifind
      POSTGRES_PASSWORD: spotifind
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotifind"]
      interval: 5s
      timeout: 5s
      retries: 5
